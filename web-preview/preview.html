,5vw,62px);font-weight:750;line-height:1.32;margin:16px 0;letter-spacing:.02em}h2{font-size:clamp(25px,3.1vw,40px);font-weight:720;line-height:1.45;letter-spacing:.015em}.eyebrow{color:#ffe3a6;font-size:12px;font-weight:700;letter-spacing:.16em}.sub{color:#f3f5f0;line-height:1.85}.actions{display:flex;gap:14px;margin-top:28px}.actions.center{justify-content:center}.btn{min-height:52px;padding:0 25px;border:1px solid #ffe0a099;background:#6f583b55;color:#fff8e8;cursor:pointer}.btn:hover{background:#d8b97f44}.ghost{min-height:50px;padding:0 25px;border:1px solid #ffffff55;background:#17363c33;color:#fff;cursor:pointer}.notice{max-width:760px}.stamp{float:right;border:1px solid #ffe0a088;color:#ffe0a0;padding:28px;transform:rotate(5deg);font:24px monospace}.echo{position:absolute;right:5%;bottom:15%;color:#fff;font-style:italic;animation:in 1s}.phoneScene{display:grid;grid-template-columns:minmax(290px,1fr) minmax(280px,1fr);gap:clamp(30px,7vw,90px);align-items:center}.phone{width:min(330px,88vw);height:500px;margin:auto;border:1px solid #ffffff99;border-radius:30px;padding:18px;background:#12262bea;box-shadow:0 35px 90px #18353f66}.phoneHead{text-align:center;border-bottom:1px solid #ffffff30;padding:6px 0 17px}.msgs{display:flex;flex-direction:column;gap:12px;padding:28px 0 42px}.msg{padding:11px 14px;border-radius:15px;background:#30474d;width:max-content;max-width:86%;font-size:15px;line-height:1.55}.msg.me{align-self:flex-end;background:#80683f}.draft{border:1px solid #ffffff40;border-radius:20px;padding:12px;color:#fff;font-size:14px}.leaf{width:270px;padding:42px 26px;border:1px solid #ffe0a088;border-radius:100% 0 100% 0;transform:rotate(-5deg);color:#fff3d3;font:italic 18px/1.8 inherit}.reflection{text-align:center}.window{width:min(700px,88vw);height:230px;border:1px solid #ffffff70;border-radius:22px;margin:0 auto 28px;background:rgba(16,38,44,.82);box-shadow:0 28px 70px #18323a55;display:grid;place-items:center;overflow:hidden;position:relative}.typedLine{font-size:clamp(22px,3vw,32px);font-weight:700;color:#fff9e9;white-space:nowrap;overflow:hidden;width:0;border-right:2px solid #ffe0a0;animation:typeLine 2.6s steps(10,end) .35s forwards,fadeLine 1.2s ease 3.6s forwards}.windowHint{position:absolute;bottom:24px;color:#dce7e4;font-size:12px;letter-spacing:.12em;animation:fadeLine .7s ease 3.3s forwards}@keyframes typeLine{to{width:10.5em}}@keyframes fadeLine{to{opacity:0;filter:blur(8px)}}.mini{display:flex;flex-direction:column;gap:8px;color:#fff;font-size:15px;line-height:1.7}.archive{text-align:center}.cards{display:grid;grid-template-columns:repeat(3,1fr);margin:30px 0;border:1px solid #ffffff40;background:#18383e55}.cards div{padding:25px;border-right:1px solid #ffffff35}.cards div:last-child{border:0}.cards small{display:block;color:#dce8e5;margin-bottom:10px}.original{min-height:500px;position:relative}.umbrella{font-size:170px;line-height:.6;color:#dbe4e1;text-align:center;transform:scaleX(1.4)}.rainword{text-align:center;color:#fff}.box{position:absolute;left:4%;bottom:18%;padding:32px 40px;background:#483a2b99;border:1px solid #ffe0a077;transform:rotate(-3deg);color:#fff2d0}.sticky{position:absolute;right:5%;top:8%;padding:22px;background:#f0d991;color:#263437;transform:rotate(3deg);box-shadow:0 16px 35px #29404455}.replyPhone .msgs{padding:22px 0 18px;gap:10px}.sentMsg{opacity:0;transform:translateY(8px);animation:messageIn .55s ease .35s forwards}.typingBubble{width:62px;color:#d7e1de;letter-spacing:.22em;animation:messageIn .45s ease 1.25s both,pulse 1s ease-in-out 1.6s 2}.replyOne{opacity:0;animation:messageIn .55s ease 3.3s forwards}.replyTwo{opacity:0;animation:messageIn .55s ease 4.15s forwards}.delivery{align-self:flex-end;color:#dce5e2;font-size:11px;margin-top:-5px;opacity:0;animation:messageIn .4s ease .85s forwards}@keyframes messageIn{to{opacity:1;transform:translateY(0)}}@keyframes pulse{50%{opacity:.45}}.sendCaption{text-align:center;margin:22px auto 0;max-width:650px}.ticket{width:min(370px,86vw);margin:24px auto;padding:25px;background:#eed89a;color:#263437;transform:rotate(-2deg);box-shadow:0 18px 45px #344a4c55}.ticket small,.ticket b,.ticket span{display:block;margin:7px;line-height:1.6}.rain{font-size:170px;color:#dbe4e1;line-height:.65;text-align:center;position:relative}.rain span{font-size:13px;position:absolute;left:43%;top:32%;color:#fff}.error{width:max-content;max-width:90%;margin:26px auto;padding:11px 18px;border:1px solid #ffd2b077;color:#fff0e5;font-size:12px;letter-spacing:.08em}.twolines{display:grid;grid-template-columns:1fr 1fr;gap:22px}.line{padding:28px;border-top:2px solid #d8e5e2;background:#17383e88}.line.new{border-color:#ffe0a0}.line small,.line b,.line span{display:block;margin:9px;line-height:1.6}.line span{color:#e3ece9}.choiceTitle{text-align:center;margin:28px 0}.roads{display:grid;grid-template-columns:1fr 1fr;gap:18px}.roads button{min-height:112px;padding:18px;background:#17383e88;color:#fff;border:1px solid #ffffff66;cursor:pointer;text-align:left}.roads button:hover{border-color:#ffe0a0;background:#6f583b66}.roads strong,.roads small{display:block}.roads strong{font-size:17px;margin-bottom:8px}.roads small{font-size:13px;line-height:1.55;color:#e5ece9;font-weight:400}.ending{text-align:center;max-width:800px;margin:auto}.ending blockquote{color:#fff5dc;font:22px/1.8 inherit;margin:32px 0}.dawn{color:#fff1c8;font:clamp(30px,4vw,54px) inherit;text-shadow:0 0 40px #ffe0a099}.modal{position:fixed;z-index:20;inset:0;background:#102226dd;backdrop-filter:blur(14px);display:grid;place-items:center}.dialog{width:min(560px,92vw);padding:40px;border:1px solid #ffffff55;background:linear-gradient(145deg,#29474e,#172f35)}.dialog p{color:#fff;line-height:1.8}.walker{position:absolute;left:36%;bottom:5%;width:28px;height:85px;opacity:.16}.walker:before{content:"";display:block;width:20px;height:20px;border-radius:50%;background:#f1f6f3;margin:auto}.walker:after{content:"";display:block;width:22px;height:62px;margin:auto;background:linear-gradient(#f1f6f3 0 60%,transparent 61%),linear-gradient(80deg,transparent 42%,#f1f6f3 43% 52%,transparent 53%);animation:walk .6s alternate infinite}@keyframes walk{to{transform:skewX(-10deg)}}@media(max-width:700px){.app{min-height:100svh}.top{height:58px;padding:0 4vw}.stage{height:calc(100% - 74px);width:92vw;overflow-y:auto;padding:20px 0 28px;align-items:start}.phoneScene{grid-template-columns:1fr;gap:18px}.phone{height:auto;min-height:390px;width:min(300px,88vw);padding:15px}.msgs{padding:18px 0 22px}.leaf{width:min(250px,80vw);padding:25px;margin:auto}.cards{grid-template-columns:1fr;margin:20px 0}.cards div{border-right:0;border-bottom:1px solid #ffffff35;padding:13px}.cards div:last-child{border-bottom:0}.actions{flex-direction:column;margin-top:18px}.actions button{width:100%}.sticky{position:relative;right:auto;top:auto;width:max-content;max-width:86%;margin-left:auto}.box{position:relative;left:auto;bottom:auto;width:max-content;max-width:90%;margin-top:14px;padding:20px}.original{min-height:0}.umbrella,.rain{font-size:115px}.twolines,.roads{grid-template-columns:1fr}.top>span{display:none}h1{font-size:clamp(30px,9vw,42px)}h2{font-size:clamp(22px,6.5vw,30px)}.window{height:190px}.typedLine{font-size:clamp(19px,6vw,26px)}.roads button{min-height:94px}.sendCaption{margin-top:15px}.walker{display:none}}@media(max-height:680px) and (min-width:701px){.stage{overflow-y:auto;padding:22px 0}.phone{height:420px}.msgs{padding:18px 0}.original{min-height:430px}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style><link rel="stylesheet" href="fixes.css"></head><body><main id="app" class="app"><div class="grain"></div><header class="top"><button id="back">← 回望</button><span><b id="num">01</b>　—　<span id="label">档案通知</span></span><button id="sound">声音开</button></header><div class="bar"><i id="progress" style="width:10%"></i></div><section id="stage" class="stage"></section><div id="modal"></div></main><script>
const scenes=["notice","chat","reason","archive","original","send","alternate","memory","final","ending"],names=["档案通知","毕业夜","未发送","撤回申请","原来的人生","另一种回答","被推迟的问题","记忆漏洞","两条人生","继续向前"];let current=0,backs=0,tone="face",ending="keep",muted=false;const app=document.querySelector("#app"),stage=document.querySelector("#stage");
const B=(text,next,cls="btn",t)=>`<button class="${cls}" onclick="go('${next}'${t?`,'${t}'`:''})">${text}</button>`;
function view(){app.className="app "+(current===5||current===6?"warm":current===7?"rainy":current===9?"dawn":"");document.querySelector("#num").textContent=String(current+1).padStart(2,"0");document.querySelector("#label").textContent=names[current];document.querySelector("#progress").style.width=(current+1)*10+"%";let h="";
if(current===0)h=`<div class="scene notice"><span class="eyebrow">人生档案馆 · 01:17</span><div class="stamp">0717</div><h1>检测到一条<br>长期未关闭的遗憾</h1><p class="sub">事件距今 7 年 · 状态：未发送</p><div class="actions">${B("查看记录 →","chat","choiceBtn") }<button class="choiceBtn" onclick="tone='avoid';document.querySelector('#echo').hidden=false">关闭通知</button></div><p id="echo" class="echo" hidden>你已经关闭过它很多次。</p></div>`;
if(current===1)h=`<div class="scene phoneScene"><div class="phone"><div class="phoneHead">那个人</div><div class="msgs"><p class="msg">到家了吗？</p><p class="msg me">到了。</p><p class="msg">今天，你是不是还有话没说？</p></div><div class="draft">其实，我也喜欢你。｜</div></div><div><div class="leaf">这句话停留了<br><b>2 分 17 秒</b><br>随后被逐字删除。</div><div class="actions center">${B("再看一眼那晚","reason","choiceBtn","face")}${B("申请找回这句话","archive","choiceBtn","avoid")}</div></div></div>`;
if(current===2)h=`<div class="scene reflection"><div class="window"><div class="typedLine">没什么。你早点睡。</div><span class="windowHint">输入中 · 随后删除</span></div><div class="mini"><span>消息消失以后，聊天框安静了下来。</span><span>屏幕另一端，也没有人再按下发送。</span></div><h2>你等的不是一个标准答案。</h2><p class="sub">你只是希望，那个人能再问一次。</p>${B("继续查看 →","archive","btn","linger")}</div>`;
if(current===3)h=`<div class="scene archive"><span class="eyebrow">事件卡 / 没有发出的告白</span><h2>被撤回的不是一个动作，<br>而是由它产生的全部后来。</h2><div class="cards"><div><small>当前结果 01</small>去了想去的地方</div><div><small>当前结果 02</small>逐渐失去联系</div><div><small>当前结果 03</small>持续七年的“如果”</div></div><div class="actions center">${B("先看它将覆盖什么","original","choiceBtn")}${B("恢复并发送","send","choiceBtn")}</div></div>`;
if(current===4)h=`<div class="scene original"><div class="sticky">我今天状态不好，<br>你能陪我一会儿吗？</div><div class="umbrella">⌒</div><p class="rainword">“今天要不要走慢一点？”<br><small>后来，有人这样问过你</small></p><div class="box">新的城市 / 一盏灯<br>一本书 / 一顿晚饭</div><p class="sub" style="text-align:center">那晚没有说出口的话，后来以另一种方式教会了你开口。</p><div class="actions center">${B("打开旧聊天","send","choiceBtn","linger")}${B("扣下手机，继续生活","send","choiceBtn","release")}</div></div>`;
if(current===5)h=`<div class="scene"><div class="phone replyPhone"><div class="phoneHead">那个人</div><div class="msgs"><p class="msg me sentMsg">其实，我也喜欢你。</p><small class="delivery">已送达</small><p class="msg typingBubble">•••</p><p class="msg replyOne">你怎么现在才说。</p><p class="msg replyTwo">我也是。</p></div><div class="draft">这一回，聊天框没有被关掉。</div></div><div class="sendCaption"><h2>有些回答不是迟到。<br>它只是在等一句话真正抵达。</h2><p class="sub">对方先显示“正在输入”，停了一会儿，才把剩下的话发出来。</p></div><div class="actions center">${B("看看它会带你去哪里 →","alternate")}</div></div>`;
if(current===6)h=`<div class="scene archive"><span class="eyebrow">另一种后来 · 第三年</span><h2>“我希望你留下，<br>但我不想让这句话替你决定。”</h2><div class="ticket"><small>未完成的选择</small><b>靠近不是放弃自己。</b><span>但相爱也不会替你回答人生。</span></div><p class="sub">三年后，被推迟的问题重新回来。<br>喜欢是真的，想去往不同方向也是真的。</p><div class="actions center">${B("先留在这里","memory","choiceBtn","avoid")}${B("说出自己的方向","memory","choiceBtn","face")}</div></div>`;
if(current===7)h=`<div class="scene archive"><span class="eyebrow">档案回收异常</span><div class="rain">⌒<span>今天要不要<br>走慢一点？</span></div><h2>“你在等人吗？”<br><small style="color:#9caaad">“不知道。”</small></h2><div class="error">检测到不属于当前人生的动作习惯</div><p class="sub">被删除的人不会留下证据，<br>却可能留下身体记得的空位。</p>${B("查看两条人生 →","final")}</div>`;
if(current===8)h=`<div class="scene"><div class="twolines"><div class="line"><small>留在现在</small><b>接住已经走过的人生</b><span>承认遗憾，也保留后来真实发生的一切。</span></div><div class="line new"><small>奔赴过去</small><b>走进那句话发出后的后来</b><span>接受另一段相爱、选择与告别的全部代价。</span></div></div><div class="choiceTitle"><h2>它们没有更正确，也没有更虚假。</h2><p class="sub">你选择的不是输赢，而是愿意承担哪一种完整。</p></div><div class="roads"><button onclick="ending='keep';go('ending')"><strong>留在现在</strong><small>保留你已经认识的人、已经获得的成长，以及仍然存在的遗憾。</small></button><button onclick="ending='rewrite';go('ending')"><strong>奔赴过去</strong><small>让那句话被听见，并亲自走完它带来的靠近、改变与告别。</small></button></div></div>`;
if(current===9){const line={avoid:"这一次，你没有立刻关掉页面。",face:"你终于能够看着答案，而不要求它改变过去。",linger:"你仍然会想起它，但想起不再等于困在原地。",release:"你没有忘记，只是不再继续刷新。"}[tone];h=`<div class="scene ending"><div class="endingPhone"><div class="endingPhoneHead"><span>‹</span><div><b>人生档案馆</b><small>刚刚</small></div><i class="onlineDot"></i></div><div class="endingPhoneBody"><span class="endingStatus">${ending==='keep'?'撤回申请已取消':'撤回已经完成'}</span><p class="endingMsg">${ending==='keep'?'原来，你不需要撤回那一次。':'你选择了亲自走过这个答案。'}</p><p class="endingMsg">你不必为了后来才知道的答案，惩罚当时那个并不知道答案的自己。</p><p class="endingMsg gold">你的选择从来不会出错。<br>你仍然可以决定下一步怎样走、怎样理解、怎样弥补。</p><p class="endingMsg"><i>${line}</i></p></div><div class="endingInput">加油，继续向前。<span>↑</span></div></div><div class="actions center"><button class="ghost" onclick="current=0;tone='face';view()">重新预览</button></div></div>`}stage.innerHTML=h}
function go(name,t){if(t)tone=t;stage.firstElementChild?.classList.add("out");setTimeout(()=>{current=scenes.indexOf(name);view()},520)}window.go=go;document.querySelector("#back").onclick=()=>{backs++;document.querySelector("#modal").innerHTML=`<div class="modal"><div class="dialog">${backs>1?`<h2>这条路已经走过了。</h2>`:`<span class="eyebrow">人生档案馆提醒</span><h2>人生没有后退选项。</h2><p>你可以怀念没有选择的那条路，也可以重新理解已经发生的事。</p><p>但此刻的你，只能从这里继续向前。</p>`}<button class="btn" onclick="document.querySelector('#modal').innerHTML=''">我知道了，继续向前</button></div></div>`};document.querySelector("#sound").onclick=e=>{muted=!muted;e.target.textContent=muted?"声音关":"声音开"};history.replaceState({},"",location.href);addEventListener("popstate",()=>{history.pushState({},"",location.href);document.querySelector("#back").click()});view();
</script><script src="fixes.js"></script></body></html>
